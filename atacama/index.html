<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Review | Atacama Digital</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Unicase:wght@500;600;700&family=Inter+Tight:wght@300;400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #000000;
    --silver: #DBDCDD;
    --white: #FFFFFF;
    --offwhite: #F5F5F5;
    --gray-95: #0A0A0A;
    --gray-90: #1A1A1A;
    --gray-80: #222222;
    --gray-70: #3A3A3A;
    --gray-60: #6B6B6B;
    --gray-50: #959595;
    --gray-40: #A0A0A0;
    --gray-30: #C4C4C4;
    --gray-10: #EEEEEE;
    --cosmos-bg: #03070A;
    --cosmos-red: #9C1F27;
    --cosmos-red-glow: #FC7D8E;
    --cosmos-blue-deep: #1B68B8;
    --cosmos-blue-mid: #5E97E4;
    --cosmos-blue-light: #9DB7F0;
    --cosmos-purple: #9E8FD0;
    --orange-desert: #E13F07;
    --chart-blue: #3B82F6;
    --chart-green: #10B981;
    --chart-amber: #F59E0B;
    --chart-purple: #8B5CF6;
    --chart-red: #EF4444;
    --alert-red-bg: rgba(239,68,68,0.08);
    --alert-red-border: rgba(239,68,68,0.2);
    --alert-red-text: #F87171;
    --alert-amber-bg: rgba(245,158,11,0.08);
    --alert-amber-border: rgba(245,158,11,0.2);
    --alert-amber-text: #FBBF24;
    --alert-green-bg: rgba(16,185,129,0.08);
    --alert-green-border: rgba(16,185,129,0.2);
    --alert-green-text: #34D399;
    --alert-blue-bg: rgba(59,130,246,0.08);
    --alert-blue-border: rgba(59,130,246,0.2);
    --alert-blue-text: #60A5FA;
    --border-dark: rgba(255,255,255,0.16);
    --border-light: rgba(0,0,0,0.12);
    --muted-dark: #A0A0A0;
    --muted-light: #6B6B6B;
  }

  body {
    font-family: 'Inter Tight', sans-serif;
    background: var(--black);
    color: var(--white);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .section-dark { background: var(--black); color: var(--white); --card-bg: var(--gray-90); --card-border: var(--border-dark); --text-muted: var(--muted-dark); --text-primary: var(--white); --section-border: var(--border-dark); }
  .section-silver { background: var(--silver); color: var(--black); --card-bg: var(--white); --card-border: var(--border-light); --text-muted: var(--muted-light); --text-primary: var(--black); --section-border: var(--border-light); }
  .section-cosmos { background: var(--cosmos-bg); color: var(--white); --card-bg: rgba(26,26,26,0.6); --card-border: rgba(255,255,255,0.1); --text-muted: var(--cosmos-blue-light); --text-primary: var(--white); --section-border: rgba(255,255,255,0.08); }

  .section-inner { position: relative; z-index: 2; max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  .section-pad { padding: 64px 0; }
  .section-pad-sm { padding: 48px 0; }

  .grid-lines { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .grid-lines .vl { position: absolute; top: 0; bottom: 0; width: 1px; }
  .grid-lines .hl { position: absolute; left: 0; right: 0; height: 1px; }
  .grid-lines .dot { position: absolute; width: 7px; height: 7px; border-radius: 50%; }
  .section-dark .grid-lines .vl, .section-dark .grid-lines .hl { background: rgba(255,255,255,0.05); }
  .section-dark .grid-lines .dot { background: rgba(255,255,255,0.12); }
  .section-silver .grid-lines .vl, .section-silver .grid-lines .hl { background: rgba(0,0,0,0.06); }
  .section-silver .grid-lines .dot { background: rgba(0,0,0,0.1); }
  .section-cosmos .grid-lines .vl, .section-cosmos .grid-lines .hl { background: rgba(94,151,228,0.08); }
  .section-cosmos .grid-lines .dot { background: rgba(94,151,228,0.15); }
  .gl { left: max(32px, calc((100% - 1280px)/2)); }
  .gr { right: max(32px, calc((100% - 1280px)/2)); }
  .dl { left: max(29px, calc((100% - 1280px)/2 - 3px)); }
  .dr { right: max(29px, calc((100% - 1280px)/2 - 3px)); }

  .hero { position: relative; min-height: 260px; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; }
  .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 20% 80%, rgba(225,63,7,0.10) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(156,31,39,0.08) 0%, transparent 40%), radial-gradient(ellipse at 50% 50%, rgba(27,104,184,0.06) 0%, transparent 60%), var(--black); }
  .hero-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 120px 120px; }
  .hero-content { position: relative; z-index: 2; max-width: 1280px; margin: 0 auto; padding: 40px 32px 32px; width: 100%; }
  .eyebrow { font-size: 11px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.25em; color: var(--text-muted, var(--gray-40)); margin-bottom: 8px; }
  .hero h1 { font-family: 'Cormorant Unicase', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 600; letter-spacing: -0.025em; line-height: 0.9; color: var(--white); margin-bottom: 16px; }
  .hero-meta { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 8px; }
  .hero-meta .info { font-size: 14px; color: var(--gray-40); }
  .hero-meta .info strong { color: var(--white); font-weight: 600; }
  .hero-meta .coords { font-size: 10px; letter-spacing: 0.15em; color: var(--gray-60); }

  .alert-bar { border-radius: 12px; padding: 14px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; }
  .alert-danger { background: var(--alert-red-bg); border: 1px solid var(--alert-red-border); color: var(--alert-red-text); }
  .alert-warning { background: var(--alert-amber-bg); border: 1px solid var(--alert-amber-border); color: var(--alert-amber-text); }
  .alert-success { background: var(--alert-green-bg); border: 1px solid var(--alert-green-border); color: var(--alert-green-text); }
  .alert-info { background: var(--alert-blue-bg); border: 1px solid var(--alert-blue-border); color: var(--alert-blue-text); }
  .alert-bar .count { padding: 2px 12px; border-radius: 9999px; font-size: 11px; font-weight: 700; margin-left: auto; }
  .alert-danger .count { background: var(--chart-red); color: var(--white); }
  .alert-warning .count { background: var(--chart-amber); color: var(--black); }
  .alert-info .count { background: var(--chart-blue); color: var(--white); }

  .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; margin-bottom: 32px; }
  .kpi-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 20px; text-align: center; transition: transform 0.2s; }
  .kpi-card:hover { transform: translateY(-2px); }
  .kpi-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
  .kpi-card .value { font-size: 28px; font-weight: 800; letter-spacing: -0.025em; color: var(--text-primary); }
  .kpi-card .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .kpi-card .benchmark { font-size: 11px; color: var(--cosmos-blue-mid); margin-top: 2px; }
  .v-blue { color: var(--cosmos-blue-mid) !important; }
  .v-red { color: var(--chart-red) !important; }
  .v-green { color: var(--chart-green) !important; }
  .v-amber { color: var(--chart-amber) !important; }
  .kpi-highlight { border-color: var(--cosmos-blue-mid) !important; }
  .kpi-danger { border-color: var(--chart-red) !important; }
  .kpi-success { border-color: var(--chart-green) !important; }

  .glass-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .glass-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: var(--text-primary); }
  .glass-card .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

  .resp-pill { display: inline-block; padding: 3px 10px; border-radius: 9999px; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .resp-mkt { background: rgba(139,92,246,0.12); color: #A78BFA; }
  .resp-com { background: rgba(59,130,246,0.12); color: #60A5FA; }

  .funnel-row { display: grid; grid-template-columns: 160px 90px 70px 70px 70px 1fr 80px; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--section-border); font-size: 13px; }
  .funnel-row:last-child { border-bottom: none; }
  .funnel-row.fh { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 500; padding-bottom: 8px; }
  .funnel-row .sn { font-weight: 600; color: var(--text-primary); }
  .funnel-row .cr { color: var(--text-muted); text-align: center; }
  .funnel-row .ac { text-align: center; font-weight: 700; color: var(--text-primary); }
  .funnel-row .nd { text-align: center; font-weight: 600; color: var(--cosmos-blue-mid); }
  .funnel-row .nd-pro { text-align: center; font-weight: 600; color: var(--chart-amber); font-size: 12px; }

  .progress-track { height: 22px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .section-silver .progress-track { background: rgba(0,0,0,0.06); }
  .progress-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; min-width: 28px; }
  .pf-great { background: var(--chart-green); color: var(--black); }
  .pf-ok { background: var(--cosmos-blue-mid); color: var(--white); }
  .pf-behind { background: var(--chart-amber); color: var(--black); }
  .pf-crit { background: var(--chart-red); color: var(--white); }

  .funnel-status { text-align: center; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .fs-great { color: var(--chart-green); }
  .fs-ok { color: var(--cosmos-blue-mid); }
  .fs-behind { color: var(--chart-amber); }
  .fs-crit { color: var(--chart-red); }

  .funnel-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--section-border); }
  .fm { text-align: center; }
  .fm .fl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
  .fm .fv { font-size: 22px; font-weight: 800; letter-spacing: -0.025em; color: var(--text-primary); }
  .fm .fs { font-size: 11px; color: var(--text-muted); }

  .evo-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
  .evo-table th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--section-border); }
  .evo-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--silver); }
  .evo-table td.mn { font-weight: 600; color: var(--text-primary); }
  .evo-table .dn { color: var(--text-muted); }

  .compliance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
  .compliance-item { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px; }
  .ci-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .ci-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .ci-score { font-size: 18px; font-weight: 800; color: var(--cosmos-blue-mid); }
  .ci-weight { font-size: 11px; color: var(--text-muted); }
  .compliance-bar { height: 6px; background: rgba(0,0,0,0.06); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
  .section-dark .compliance-bar { background: rgba(255,255,255,0.06); }
  .compliance-bar-fill { height: 100%; background: linear-gradient(90deg, var(--cosmos-blue-deep), var(--cosmos-blue-mid)); border-radius: 3px; }
  .compliance-checklist { list-style: none; }
  .compliance-checklist li { font-size: 12px; color: var(--text-muted); padding: 3px 0; display: flex; align-items: center; gap: 6px; }

  .lead-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
  .lead-table th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 500; text-align: left; padding: 6px 10px; }
  .lead-table td { padding: 10px; font-size: 13px; background: var(--card-bg); vertical-align: middle; color: var(--text-primary); }
  .lead-table tr td:first-child { border-radius: 8px 0 0 8px; }
  .lead-table tr td:last-child { border-radius: 0 8px 8px 0; }
  .lead-name { font-weight: 600; font-size: 13px; }
  .lead-company { font-size: 11px; color: var(--text-muted); }
  .lead-phone { font-size: 11px; color: var(--text-muted); opacity: 0.6; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin: 1px 2px; background: rgba(255,255,255,0.07); color: var(--gray-30); }
  .section-silver .tag { background: rgba(0,0,0,0.05); color: var(--gray-60); }
  .tag-red { background: var(--alert-red-bg); color: var(--alert-red-text); border: 1px solid var(--alert-red-border); }
  .tag-amber { background: var(--alert-amber-bg); color: var(--alert-amber-text); border: 1px solid var(--alert-amber-border); }
  .tag-blue { background: var(--alert-blue-bg); color: var(--alert-blue-text); border: 1px solid var(--alert-blue-border); }
  .tag-green { background: var(--alert-green-bg); color: var(--alert-green-text); border: 1px solid var(--alert-green-border); }

  .decision { display: inline-flex; align-items: center; padding: 4px 14px; border-radius: 9999px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
  .d-perder { background: var(--alert-red-bg); color: var(--alert-red-text); border: 1px solid var(--alert-red-border); }
  .d-agir { background: var(--alert-blue-bg); color: var(--alert-blue-text); border: 1px solid var(--alert-blue-border); }
  .d-standby { background: rgba(255,255,255,0.05); color: var(--gray-40); border: 1px solid rgba(255,255,255,0.08); }
  .d-urgente { background: var(--chart-red); color: var(--white); }
  .section-silver .d-standby { background: rgba(0,0,0,0.04); color: var(--gray-60); border-color: rgba(0,0,0,0.08); }

  .days-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 700; }
  .days-ok { background: var(--alert-green-bg); color: var(--alert-green-text); }
  .days-warn { background: var(--alert-amber-bg); color: var(--alert-amber-text); }
  .days-danger { background: var(--alert-red-bg); color: var(--alert-red-text); }

  .action-text { font-size: 12px; color: var(--text-muted); max-width: 220px; line-height: 1.4; }
  .cadence-status { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); }
  .cadence-dot { width: 6px; height: 6px; border-radius: 50%; }
  .c-ok { background: var(--chart-green); }
  .c-late { background: var(--chart-amber); }
  .c-dead { background: var(--chart-red); }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
  .chart-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 24px; }
  .chart-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text-primary); }
  .chart-container { position: relative; height: 220px; }

  .summary-list { list-style: none; }
  .summary-list li { padding: 8px 0; border-bottom: 1px solid var(--section-border); font-size: 13px; display: flex; align-items: center; gap: 8px; color: var(--text-primary); }
  .summary-list li:last-child { border-bottom: none; }
  .pdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .pdot-red { background: var(--chart-red); }
  .pdot-amber { background: var(--chart-amber); }
  .pdot-blue { background: var(--chart-blue); }
  .pdot-green { background: var(--chart-green); }

  .status-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .status-metric { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px; text-align: center; }
  .sm-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; }
  .sm-real { font-size: 20px; font-weight: 800; color: var(--text-primary); }
  .sm-vs { font-size: 12px; color: var(--cosmos-blue-mid); margin-top: 4px; }
  .bench-bar { display: flex; gap: 6px; align-items: flex-end; height: 40px; margin-top: 8px; justify-content: center; }
  .bench-bar .bar { width: 20px; border-radius: 3px 3px 0 0; min-height: 4px; }
  .bar-real { background: var(--cosmos-blue-mid); }
  .bar-bench { background: var(--gray-70); }
  .section-silver .bar-bench { background: var(--gray-30); }

  .sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .sec-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; color: var(--text-primary); }
  .badge { font-size: 10px; padding: 3px 10px; border-radius: 9999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .badge-default { background: rgba(255,255,255,0.07); color: var(--gray-30); }
  .section-silver .badge-default { background: rgba(0,0,0,0.05); color: var(--gray-60); }
  .badge-red { background: var(--alert-red-bg); color: var(--alert-red-text); }
  .badge-amber { background: var(--alert-amber-bg); color: var(--alert-amber-text); }
  .badge-blue { background: var(--alert-blue-bg); color: var(--alert-blue-text); }
  .badge-green { background: var(--alert-green-bg); color: var(--alert-green-text); }
  .badge-purple { background: rgba(139,92,246,0.1); color: #A78BFA; }

  .footer { text-align: center; padding: 48px 32px; color: var(--gray-50); font-size: 12px; background: var(--black); border-top: 1px solid var(--border-dark); }
  .footer .coords { font-size: 10px; letter-spacing: 0.15em; color: var(--gray-70); margin-top: 8px; }

  .action-checklist { list-style: none; }
  .action-checklist li { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; color: var(--silver); line-height: 1.5; }
  .action-checklist li:last-child { border-bottom: none; }
  .action-check { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--gray-60); cursor: pointer; flex-shrink: 0; margin-top: 2px; transition: all 0.15s; }
  .action-check.checked { background: var(--chart-green); border-color: var(--chart-green); }
  .action-priority { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 9999px; flex-shrink: 0; }
  .ap-urgente { background: var(--chart-red); color: var(--white); }
  .ap-importante { background: var(--alert-amber-bg); color: var(--alert-amber-text); border: 1px solid var(--alert-amber-border); }
  .ap-normal { background: var(--alert-blue-bg); color: var(--alert-blue-text); border: 1px solid var(--alert-blue-border); }

  section[id] { scroll-margin-top: 56px; }

  .sticky-nav { position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.82); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.08); transition: box-shadow 0.2s; }
  .sticky-nav.scrolled { box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 32px; display: flex; align-items: center; gap: 6px; height: 48px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
  .nav-inner::-webkit-scrollbar { display: none; }
  .nav-inner a { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-40); text-decoration: none; padding: 6px 12px; border-radius: 6px; white-space: nowrap; transition: all 0.15s; }
  .nav-inner a:hover { color: var(--white); background: rgba(255,255,255,0.06); }
  .nav-inner a.nav-alert { color: var(--chart-red); }

  .loading-state { display: flex; align-items: center; justify-content: center; min-height: 400px; flex-direction: column; gap: 16px; }
  .loading-state .spinner { width: 32px; height: 32px; border: 3px solid var(--gray-70); border-top-color: var(--cosmos-blue-mid); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-state { color: var(--chart-red); text-align: center; padding: 48px; }

  @media (max-width: 1024px) {
    .kpi-grid { grid-template-columns: repeat(3, 1fr); }
    .charts-row, .compliance-grid { grid-template-columns: 1fr; }
    .status-grid { grid-template-columns: repeat(2, 1fr); }
    .section-inner { padding: 0 20px; }
    .hero-content { padding: 32px 20px; }

.07l68.34 203.3Zm14.13-307L9313.62 547h97.93l41.7-124.7h189.5l41.9 124.7h97.6l-177.9-504.87ZM9931.4 470.42V42.12h-91.49V547h314.11v-76.58Z"/></svg>';

function renderHero(m, config) {
  const dt = new Date(m.generated_at);
  const h = dt.getHours().toString().padStart(2,'0') + ':' + dt.getMinutes().toString().padStart(2,'0');
  document.getElementById('hero-info').innerHTML = `<strong>Periodo:</strong> ${m.period_start.split('-').reverse().join('/')} a ${m.period_end.split('-').reverse().join('/')} (Dia ${m.day_of_month} de ${m.days_in_month}) &nbsp;|&nbsp; Semana ${String(m.week_number).padStart(2,'0')} &nbsp;|&nbsp; ${m.week_day} &nbsp;|&nbsp; <span style="color:var(--chart-amber);">Atualizado as ${h}</span>`;
  document.getElementById('hero-coords').textContent = config?.coords || '';
}

function renderAlerts(alerts) {
  const c = document.getElementById('alerts-container');
  c.innerHTML = alerts.map(a => `<div class="alert-bar alert-${a.type}"><strong>${a.icon}:</strong>&nbsp; ${a.message}<span class="count">${a.count}</span></div>`).join('');
}

    <div class="kpi-card kpi-danger"><div class="label">Vendas / Meta</div><div class="value v-red">${k.vendas_atual} / ${k.vendas_meta}</div><div class="sub">${k.mes_label}</div></div>
    <div class="kpi-card kpi-success"><div class="label">Prox. Fechamento</div><div class="value v-green">${fmtR(k.prox_fechamento_valor)}</div><div class="sub">${k.prox_fechamento_label}</div></div>

function renderFunnel(f, m) {
  const el = document.getElementById('funnel-section');
  const rows = f.etapas.map(e => {
    const pill = e.resp === 'MKT' ? '<span class="resp-pill resp-mkt" style="margin-right:4px;">MKT</span>' : '<span class="resp-pill resp-com" style="margin-right:4px;">COM</span>';
    const pct = Math.min(e.progresso_pct, 100);
    const pctLabel = e.progresso_pct >= 999 ? '&#8734;' : e.progresso_pct + '%';
    const pfClass = e.progresso_pct >= 100 ? 'pf-great' : e.progresso_pct >= 70 ? 'pf-ok' : e.progresso_pct >= 40 ? 'pf-behind' : 'pf-crit';
    const fsClass = e.status === 'ACIMA' ? 'fs-great' : e.status === 'OK' ? 'fs-ok' : e.status === 'ATRAS' ? 'fs-behind' : 'fs-crit';
    return `<div class="funnel-row"><div class="sn">${pill} ${e.nome}</div><div class="cr">${e.benchmark_pct}</div><div class="ac">${e.atual}</div><div class="nd">${e.meta_mes}</div><div class="nd-pro">~${e.proporcional}</div><div><div class="progress-track"><div class="progress-fill ${pfClass}" style="width:${pct}%">${pctLabel}</div></div></div><div class="funnel-status ${fsClass}">${e.status}</div></div>`;
  }).join('');

  const vendaPct = f.meta_vendas > 0 ? Math.round((m.kpis.vendas_atual / f.meta_vendas) * 100) : 0;
  const diagHtml = f.diagnostico.map(d => `<strong>${d.area}:</strong> ${d.texto}`).join('<br>');

  el.innerHTML = `
    <p class="eyebrow">Funil de Metas</p>
    <h2 style="font-size:32px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px;">${m.meta.month_name} ${m.meta.year} — Dia ${m.meta.day_of_month} de ${m.meta.days_in_month}</h2>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:8px;">Meta: ${f.meta_vendas} vendas/mes | Ticket benchmark: R$${fmt(f.ticket_benchmark)} | Revenue alvo: ${fmtR(f.revenue_alvo)}</p>
    <p style="font-size:12px;color:var(--cosmos-blue-deep);margin-bottom:28px;font-weight:500;">
      <span class="resp-pill resp-mkt">Marketing</span> Responsavel pelo volume de Leads e MQLs &nbsp;&nbsp;
      <span class="resp-pill resp-com">Comercial</span> Responsavel de Reunioes em diante
    </p>
    <div class="glass-card" style="background:var(--white);border-color:var(--border-light);">
      <div class="funnel-row fh"><div>Etapa</div><div style="text-align:center">Benchmark</div><div style="text-align:center">Atual</div><div style="text-align:center">Meta Mes</div><div style="text-align:center">Proporcional<br><span style="font-size:9px;opacity:0.7;">ate hoje</span></div><div>Progresso</div><div style="text-align:center">Status</div></div>
      ${rows}
      <div class="funnel-row" style="padding:14px 0;background:rgba(239,68,68,0.03);border-radius:8px;margin-top:4px;">
        <div class="sn" style="font-size:16px;">Vendas (Won)</div><div class="cr">—</div><div class="ac" style="font-size:20px;color:var(--chart-red);">${m.kpis.vendas_atual}</div><div class="nd" style="font-size:20px;">${f.meta_vendas}</div><div class="nd-pro" style="font-size:14px;">~0</div><div><div class="progress-track" style="height:28px;"><div class="progress-fill pf-crit" style="width:${Math.max(vendaPct, 1)}%;min-width:40px;">${m.kpis.vendas_atual}/${f.meta_vendas}</div></div></div><div class="funnel-status fs-crit" style="font-size:14px;">${vendaPct}%</div>
      </div>
      <div class="funnel-summary">
        <div class="fm"><div class="fl">Win Rate Alvo</div><div class="fv" style="color:var(--cosmos-blue-mid);">${f.win_rate_alvo}%</div><div class="fs">Propostas → Vendas</div></div>
        <div class="fm"><div class="fl">Leads/Mes Necessarios</div><div class="fv" style="color:var(--chart-amber);">~${f.leads_meta_mes}</div><div class="fs">para ${f.meta_vendas} vendas a benchmark</div></div>
        <div class="fm"><div class="fl">Leads/Mes Atual</div><div class="fv" style="color:var(--chart-red);">~${f.leads_semana_atual ? f.leads_semana_atual * 4 : 0}</div><div class="fs">${f.leads_semana_atual}/semana x 4</div></div>
        <div class="fm"><div class="fl">Revenue Projetado</div><div class="fv" style="color:var(--chart-red);">${fmtR(f.revenue_projetado)}</div><div class="fs">meta: ${fmtR(f.revenue_alvo)}</div></div>
      </div>
    </div>
    <div style="padding:16px 20px;background:rgba(156,31,39,0.05);border:1px solid rgba(156,31,39,0.1);border-radius:12px;">
      <div style="font-weight:700;font-size:14px;margin-bottom:6px;color:var(--cosmos-red);">Diagnostico vs Benchmark</div>
      <div style="font-size:13px;color:var(--muted-light);line-height:1.7;">${diagHtml}</div>
    </div>`;
}

function renderPerformance(mov, cohort, taxas, charts) {
  const el = document.getElementById('performance-section');
  const corMap = { green: 'var(--chart-green)', blue: 'var(--chart-blue)', red: 'var(--chart-red)', muted: 'var(--gray-50)' };
  const detRows = mov.detalhes.map(d => `<tr><td class="mn" style="color:${corMap[d.cor]}">${d.descricao}</td><td style="color:${corMap[d.cor]};font-weight:700;">${d.qtd}</td><td>${d.detalhe}</td></tr>`).join('');

  const cohortRows = cohort.map(c => {
    if (c.placeholder) return `<tr style="opacity:0.2;"><td class="mn">${c.turma}<br><span style="font-size:10px;">${c.subtitulo}</span></td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>`;
    const style = c.destaque ? '' : 'style="border-bottom:1px solid rgba(255,255,255,0.06);"';
    const nameColor = c.destaque ? 'var(--chart-green)' : 'var(--gray-50)';

function renderCompliance(comp) {
  const el = document.getElementById('compliance-section');
  const cards = comp.categorias.map(cat => {
    const items = cat.items.map(i => `<li><span style="color:${i.ok ? 'var(--chart-green)' : 'var(--chart-red)'};">${i.ok ? '&#10003;' : '&#10007;'}</span> ${i.texto}</li>`).join('');

    const barW = cat.score != null ? cat.score : 0;
    return `<div class="compliance-item" style="background:var(--white);"><div class="ci-header"><div><div class="ci-name">${cat.nome}</div><div class="ci-weight">peso ${cat.peso}%</div></div><div class="ci-score">${score}</div></div><div class="compliance-bar"><div class="compliance-bar-fill" style="width:${barW}%"></div></div><ul class="compliance-checklist">${items}</ul></div>`;

  el.innerHTML = `

function renderActions(acoes, pipeline, meta) {
  const el = document.getElementById('actions-section');
  const actionItems = acoes.map(a => `<li><div class="action-check" onclick="this.classList.toggle('checked')"></div><span class="action-priority ap-${a.prioridade}">${a.prioridade === 'urgente' ? 'Urgente' : a.prioridade === 'importante' ? 'Importante' : 'Normal'}</span><div>${a.html}</div></li>`).join('');

  const pipelineHtml = pipeline.etapas.map(etapa => {
    const valorLabel = etapa.valor ? fmtR(etapa.valor) : '';
    const headerCols = etapa.colunas.map(c => `<th>${c}</th>`).join('');
    const rows = etapa.leads.map(l => {
      const nameCell = `<td><div class="lead-name">${l.nome}</div>${l.empresa ? '<div class="lead-company">' + l.empresa + '</div>' : ''}${l.telefone ? '<div class="lead-phone">' + l.telefone + '</div>' : ''}</td>`;
      const valCell = l.valor ? `<td><strong class="${l.valor_cor ? 'v-' + l.valor_cor : ''}">${l.valor}</strong></td>` : (l.data !== undefined ? `<td>${l.data}</td>` : '<td>—</td>');
      const daysCell = `<td><span class="days-badge days-${l.dias_nivel}">${l.dias}d</span></td>`;
      const tagsCell = `<td>${l.tags.map(t => `<span class="tag${t.cor !== 'default' ? ' tag-' + t.cor : ''}">${t.texto}</span>`).join('')}</td>`;
      const cadCell = `<td><div class="cadence-status"><span class="cadence-dot c-${l.cadencia_cor}"></span> ${l.cadencia}</div></td>`;
      const decCell = `<td><span class="decision d-${l.decisao_tipo}">${l.decisao}</span></td>`;
      const actCell = `<td class="action-text">${l.acao}</td>`;
      return `<tr>${nameCell}${valCell}${daysCell}${tagsCell}${cadCell}${decCell}${actCell}</tr>`;
    }).join('');
    return `<div id="${etapa === pipeline.etapas[0] ? 'pipeline' : ''}" style="margin-bottom:28px;"><div class="sec-header"><div class="sec-title">${etapa.nome} <span class="badge badge-${etapa.badge_cor}">${etapa.count} leads</span>${valorLabel ? ' <span class="badge badge-' + etapa.badge_cor + '">' + valorLabel + '</span>' : ''}</div></div><table class="lead-table"><thead><tr>${headerCols}</tr></thead><tbody>${rows}</tbody></table></div>`;
  }).join('');

  el.innerHTML = `
    <p class="eyebrow">Decisoes</p>
    <h2 style="font-size:32px;font-weight:700;letter-spacing:-0.02em;margin-bottom:28px;">Acoes para Hoje — ${meta.period_start.split('-').reverse().join('/')}</h2>
    <div class="glass-card" style="border-color:rgba(239,68,68,0.2);">
      <h3 style="color:var(--alert-red-text);margin-bottom:12px;">Plano de Acao — Checklist</h3>
      <p style="font-size:12px;color:var(--gray-40);margin-bottom:16px;">Marque cada item apos execucao. Revisado no proximo PLRW.</p>
      <ul class="action-checklist">${actionItems}</ul>
    </div>
    ${pipelineHtml}
    <div class="charts-row">
      <div class="chart-card"><h3>Distribuicao do Pipeline</h3><div class="chart-container"><canvas id="funnelChart"></canvas></div></div>
      <div class="chart-card"><h3>Decisoes Recomendadas</h3><div class="chart-container"><canvas id="decisionChart"></canvas></div></div>
    </div>`;
}

function renderStatus(sr) {
  const el = document.getElementById('status-section');
  const taxasCards = sr.taxas.map(t => {
    const maxVal = Math.max(t.real, t.benchmark);
    const realH = maxVal > 0 ? Math.round((t.real / maxVal) * 100) : 2;
    const benchH = maxVal > 0 ? Math.round((t.benchmark / maxVal) * 100) : 2;
    const redStyle = t.real === 0 ? 'style="color:var(--chart-red);"' : '';
    return `<div class="status-metric" style="background:var(--white);"><div class="sm-label">${t.nome}</div><div class="sm-real" ${redStyle}>${t.real}%</div><div class="sm-vs">benchmark: ${t.benchmark}%</div><div class="bench-bar"><div class="bar bar-real" style="height:${realH}%"></div><div class="bar bar-bench" style="height:${benchH}%"></div></div></div>`;
  }).join('');

  const opItems = sr.top_oportunidades.map(o => `<li><span class="pdot pdot-${o.cor}"></span> ${o.html}</li>`).join('');
  const probItems = sr.top_problemas.map(p => `<li><span class="pdot pdot-${p.cor}"></span> ${p.html}</li>`).join('');

  el.innerHTML = `
    <p class="eyebrow">Resumo</p>
    <h2 style="font-size:32px;font-weight:700;letter-spacing:-0.02em;margin-bottom:28px;">Status Review</h2>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div class="glass-card" style="background:var(--white);border-color:var(--border-light);"><h3 style="color:var(--chart-green);">Top 3 Oportunidades</h3><ul class="summary-list" style="margin-top:8px;">${opItems}</ul></div>

}

    type: 'bar',
    data: { labels: charts.value_chart.labels, datasets: [{ label: 'Valor (R$)', data: charts.value_chart.data, backgroundColor: charts.value_chart.colors, borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6B6B6B', callback: v => 'R$' + (v/1000).toFixed(0) + 'k' } }, x: { grid: { display: false }, ticks: { color: '#6B6B6B', font: { size: 10 } } } } }
  });

  new Chart(document.getElementById('funnelChart'), {
    type: 'doughnut',
    data: { labels: charts.funnel_chart.labels, datasets: [{ data: charts.funnel_chart.data, backgroundColor: ['#3A3A3A', '#959595', '#9E8FD0', '#5E97E4', '#F59E0B', '#10B981'], borderColor: '#000', borderWidth: 3 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#C4C4C4', font: { size: 11 }, padding: 8 } } } }
  });

  new Chart(document.getElementById('decisionChart'), {
    type: 'doughnut',
    data: { labels: charts.decision_chart.labels, datasets: [{ data: charts.decision_chart.data, backgroundColor: charts.decision_chart.colors, borderColor: '#000', borderWidth: 3 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#C4C4C4', font: { size: 11 }, padding: 8 } } } }
  });

  if (mkt?.projecao) {
    new Chart(document.getElementById('marketingChart'), {
      type: 'line',
      data: { labels: mkt.projecao.dias_labels, datasets: [
        { label: 'Leads reais (acumulado)', data: mkt.projecao.real_acumulado, borderColor: '#10B981', backgroundColor: 'rgba(16,185,129,0.1)', borderWidth: 3, pointRadius: 6, pointBackgroundColor: '#10B981', fill: true, spanGaps: false, tension: 0 },
        { label: 'Meta acumulada', data: mkt.projecao.meta_acumulada, borderColor: 'rgba(167,139,250,0.5)', borderWidth: 2, borderDash: [6, 4], pointRadius: 3, pointBackgroundColor: 'rgba(167,139,250,0.5)', fill: false, tension: 0 }
      ] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#C4C4C4', font: { size: 11 } } } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6B6B6B' } }, x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6B6B6B', font: { size: 10 } } } } }
    });
  }
}

function adaptData(r) {
  // If data already has old format (from mock), return as-is
  if (r.alerts && r.alerts[0] && r.alerts[0].type) return r;

  const k = r.kpis || {};
  const m = r.meta || {};
  const aguardando = (r.pipeline_leads?.aguardando || []);
  const valorAguardando = aguardando.reduce((s,l) => s + (l.valor||0), 0);
  const leadsAtivos = k.leads_ativos || 0;
  const leadsParaLost = k.leads_risco_perda || 0;
  const lostPct = leadsAtivos > 0 ? Math.round(leadsParaLost / leadsAtivos * 1000) / 10 : 0;

  // Adapt alerts
  const alerts = (r.alerts || []).map(a => ({
    type: a.tipo === 'danger' ? 'danger' : a.tipo === 'warning' ? 'warning' : 'info',
    icon: a.tipo === 'danger' ? 'Urgente' : a.tipo === 'warning' ? 'Atencao' : 'Info',
    message: a.msg,
    count: 0
  }));

  // Adapt KPIs
  const kpis = {
    leads_ativos: leadsAtivos,
    valor_pipeline: k.valor_pipeline || 0,
    valor_pipeline_real: k.valor_pipeline || 0,
    ticket_medio: k.ticket_medio || 0,
    ticket_benchmark: k.ticket_benchmark || 2500,
    vendas_atual: k.vendas || 0,
    vendas_meta: k.meta_vendas || 7,
    mes_label: (m.month_name || 'abril') + ' ' + (m.year || 2026),
    prox_fechamento_valor: valorAguardando,
    prox_fechamento_label: 'aguardando pagamento',
    leads_para_lost: leadsParaLost,
    leads_para_lost_pct: lostPct,
    pipeline_real_apos_limpeza: leadsAtivos - leadsParaLost,
    pipeline_real_valor: k.valor_pipeline || 0
  };

  // Adapt meta
  const meta = {
    generated_at: m.generated_at ? new Date().toISOString() : new Date().toISOString(),
    period_start: m.period_start || new Date().toISOString().slice(0,10).replace(/-\d\d$/, '-01'),
    period_end: m.period_end || new Date().toISOString().slice(0,10),
    day_of_month: m.day_of_month || new Date().getDate(),
    days_in_month: 30,
    week_number: m.week_number || Math.ceil((m.day_of_month||1) / 7),
    week_day: m.week_day || ['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado'][new Date().getDay()],
    month_name: m.month_name || 'Abril',
    year: m.year || 2026,
    client_name: m.client_name || 'Atacama Digital'
  };

  // Adapt funnel_metas
  const funnelEtapas = (r.funnel_metas || []).map(f => {
    const resp = ['entrada','mql'].includes(f.etapa) ? 'MKT' : 'COM';
    const prog = f.progresso || 0;
    const status = prog >= 100 ? 'ACIMA' : prog >= 50 ? 'OK' : 'ATRAS';
    return {
      nome: f.label, resp, benchmark_pct: f.meta ? (f.meta > 100 ? '100%' : f.meta + '') : '—',
      atual: f.atual, meta_mes: f.meta || 0, proporcional: 0,
      progresso_pct: prog, status
    };
  });
  const funnel_metas = {
    meta_vendas: k.meta_vendas || 7, ticket_benchmark: k.ticket_benchmark || 2500,
    revenue_alvo: k.revenue_alvo || 17500, leads_meta_mes: 227,
    leads_semana_atual: 0, revenue_projetado: k.receita_fechada || 0,
    win_rate_alvo: 50, etapas: funnelEtapas, diagnostico: []
  };

  // Adapt movimentacao
  const mov = r.movimentacao || {};
  const movimentacao = {
    semana_label: 'Semana ' + String(meta.week_number).padStart(2,'0'),
    entraram: mov.entraram || 0, avancaram: mov.avancaram || 0,
    recomendados_lost: leadsParaLost,
    detalhes: [
      { descricao: '+ Novos leads hoje', qtd: '+' + (mov.entraram||0), cor: 'green', detalhe: '' },
      { descricao: 'Avancaram de etapa', qtd: String(mov.avancaram||0), cor: 'blue', detalhe: '' }
    ],
    leitura: 'Dados gerados automaticamente pelo N8N.'
  };

  // Adapt taxas
  const taxas_conversao = {
    nota: 'Taxas calculadas automaticamente.',
    taxas: (r.taxas_conversao || []).map(t => ({
      nome: t.etapa, descricao: '', real: t.real, benchmark: t.benchmark,
      bar_pct: t.benchmark > 0 ? Math.min(Math.round(t.real / t.benchmark * 100), 100) : 0,
      status_text: 'Alvo: ' + t.benchmark + '%',
      status_cor: t.real >= t.benchmark ? 'green' : t.real > 0 ? 'amber' : 'muted',
      nota: ''
    }))
  };

  // Adapt compliance
  const compliance = {
    score_geral: null, nota: 'Preenchimento automatico',
    categorias: (r.compliance || []).map((c,i) => ({
      nome: c.item, peso: 25, score: c.status === 'ok' ? 100 : null,
      items: [{ texto: c.item, ok: c.status === 'ok' }]
    }))
  };

  // Adapt acoes
  const acoes = (r.acoes || []).map(a => ({
    prioridade: a.tipo === 'danger' ? 'urgente' : a.tipo === 'warning' ? 'importante' : 'normal',
    html: '<strong>' + a.acao + '</strong>'
  }));

  // Adapt pipeline_leads
  const groupLabels = { entrada:'Entrada', em_contato:'Em Contato', mql:'Qualificados (MQL)', reuniao:'Reuniao Agendada', proposta:'Proposta Enviada', aguardando:'Aguardando Pagamento' };
  const groupBadge = { entrada:'default', em_contato:'default', mql:'purple', reuniao:'blue', proposta:'amber', aguardando:'green' };
  const groupOrder = ['aguardando','proposta','reuniao','mql','em_contato','entrada'];
  const pipeline_leads = { etapas: groupOrder.map(g => {
    const leads = r.pipeline_leads?.[g] || [];
    const valor = leads.reduce((s,l) => s + (l.valor||0), 0);
    return {
      nome: groupLabels[g] || g, badge_cor: groupBadge[g] || 'default',
      count: leads.length, valor: valor || null,
      colunas: ['Lead','Valor','Dias','Tags','Cadencia','Decisao','Acao'],
      leads: leads.map(l => {
        const diasN = l.idade_dias >= 10 ? 'danger' : l.idade_dias >= 5 ? 'warn' : 'ok';
        const cadCor = l.cadencia === 'urgente' ? 'dead' : l.cadencia === 'acelerada' ? 'late' : l.cadencia === 'atrasada' ? 'late' : 'ok';
        const decTipo = l.decisao === 'perder_ou_reativar' ? 'urgente' : l.decisao === 'avançar' || l.decisao === 'avancar' ? 'agir' : 'standby';
        const decLabel = l.decisao === 'perder_ou_reativar' ? 'DECIDIR' : l.decisao === 'avançar' || l.decisao === 'avancar' ? 'AGIR' : 'STAND-BY';
        return {
          nome: l.nome?.replace(/^Lead #\d+$/, 'Lead ' + l.id) || 'Sem nome',
          empresa: l.contato !== 'Sem contato' ? l.contato : null,
          valor: l.valor > 0 ? 'R$' + l.valor.toLocaleString('pt-BR') : null,
          valor_cor: l.valor >= 5000 ? 'green' : l.valor >= 3000 ? 'amber' : null,
          dias: l.idade_dias || 0, dias_nivel: diasN,
          tags: [{ texto: l.etapa?.split(' ').pop() || '', cor: 'default' }],
          cadencia: l.cadencia || 'normal', cadencia_cor: cadCor,
          decisao: decLabel, decisao_tipo: decTipo,
          acao: l.decisao === 'perder_ou_reativar' ? 'Decidir: reativar ou Lost' : l.decisao === 'avançar' || l.decisao === 'avancar' ? 'Follow-up urgente' : 'Cadencia normal'
        };
      })
    };
  }).filter(e => e.count > 0) };

  // Adapt marketing
  const mkt = r.marketing || {};
  const marketing = {
    novos_leads_hoje: mkt.leads_novos_hoje || 0, meta_diaria: Math.round(227/30),
    deveriam_ter: Math.round(227/30 * (m.day_of_month||1)),
    leads_meta_formula: '227 / 30 dias', pct_acima_meta: 0,
    novos_mqls_hoje: mkt.mqls_hoje || 0, meta_mql_diaria: 1,
    taxa_qualificacao: 0, taxa_qualificacao_benchmark: 15,
    leads_novos: [], diagnostico: [],
    projecao: { dias_labels: ['Dia 1'], meta_acumulada: [8], real_acumulado: [mkt.leads_novos_hoje || 0] }
  };

  // Adapt status_review
  const sr = r.status_review || {};
  const status_review = {
    taxas: (sr.taxas_conversao || []).map(t => ({ nome: t.etapa, real: t.real, benchmark: t.benchmark })),
    top_oportunidades: (sr.top_oportunidades || []).map(o => ({ cor: 'green', html: '<strong>' + (o.nome||'').substring(0,40) + '</strong> — R$' + (o.valor||0).toLocaleString('pt-BR') + ' (' + (o.etapa||'') + ')' })),
    top_problemas: (sr.top_problemas || []).map(p => ({ cor: 'red', html: '<strong>' + (p.nome||'').substring(0,40) + '</strong> — ' + (p.idade_dias||0) + 'd (' + (p.etapa||'') + ')' }))
  };

  // Adapt charts
  const ch = r.charts || {};
  const charts = {
    evo_chart: { labels: ch.funil?.labels || [], data: ch.funil?.datasets?.[0]?.data || [], colors: ['#959595','#5E97E4','#8B5CF6','#3B82F6','#F59E0B','#10B981'] },
    value_chart: { labels: ch.pipeline_valor?.labels || [], data: ch.pipeline_valor?.datasets?.[0]?.data || [], colors: ['#3A3A3A','#3A3A3A','#9E8FD0','#5E97E4','#F59E0B','#10B981'] },
    funnel_chart: { labels: ch.funil?.labels || [], data: ch.funil?.datasets?.[0]?.data || [] },
    decision_chart: { labels: ['Manter','Avancar','Decidir'], data: [leadsAtivos - (k.leads_urgentes||0) - leadsParaLost, k.leads_urgentes||0, leadsParaLost], colors: ['#959595','#3B82F6','#EF4444'] }
  };

  return { meta, alerts, kpis, funnel_metas, movimentacao, cohort: [], taxas_conversao, compliance, acoes, pipeline_leads, marketing, status_review, charts };
}

async function init() {
  try {
    const [dataResp, configResp] = await Promise.all([
      fetch('./dashboard-data.json'),
      fetch('./client-config.json').catch(() => null)
    ]);
    if (!dataResp.ok) throw new Error('Dados nao encontrados');
    const raw = await dataResp.json();
    const config = configResp?.ok ? await configResp.json() : null;

    // Adapter: convert new Code node format to dashboard HTML format
    const D = adaptData(raw);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    renderHero(D.meta, config);
    renderAlerts(D.alerts);
    renderKPIs(D.kpis);
    renderFunnel(D.funnel_metas, D);
    renderPerformance(D.movimentacao, D.cohort, D.taxas_conversao, D.charts);
    renderCompliance(D.compliance);
    renderActions(D.acoes, D.pipeline_leads, D.meta);
    renderMarketing(D.marketing);
    renderStatus(D.status_review);
    renderFooter(D.meta, config);
    renderCharts(D.charts, D.marketing);

    document.title = `Pipeline Review | ${D.meta.client_name || 'Dashboard'}`;
  } catch (err) {
    document.getElementById('loading').innerHTML = `<div class="error-state"><div style="font-size:24px;margin-bottom:8px;">Erro ao carregar dados</div><div style="color:var(--gray-40);font-size:13px;">${err.message}<br>Verifique se dashboard-data.json existe no mesmo diretorio.</div></div>`;
  }
}

// Nav behavior
const nav = document.getElementById('mainNav');
window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 50));
document.querySelectorAll('.nav-inner a').forEach(link => {
  link.addEventListener('click', e => { e.preventDefault(); const t = document.querySelector(link.getAttribute('href')); if (t) t.scrollIntoView({ behavior: 'smooth' }); });
});

init();
</script>
